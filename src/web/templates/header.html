{{define "header"}}
<header>
    <div class="container">
        <div class="logo">
            <img src="/static/images/logo.png" alt="Jokes API Logo" width="40" height="40">
            <h1>🎭 Jokes API</h1>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
            <button id="notification-btn" class="icon-btn" aria-label="Notifications">
                <span class="notification-icon">🔔</span>
                <span class="badge" id="notification-badge" style="display: none;">0</span>
            </button>
        </div>
    </div>
</header>
{{end}}
