name: jokes

services:
  api:
    build: .
    container_name: jokes-api
    ports:
      - "3009:3009"
    environment:
      - NODE_ENV=production
      - PORT=3009
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const options = { host: 'localhost', port: 3009, path: '/healthz', timeout: 2000 }; const req = http.request(options, (res) => { if (res.statusCode === 200) { process.exit(0); } else { process.exit(1); } }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jokes

networks:
  jokes:
    external:false
    driver: bridge
